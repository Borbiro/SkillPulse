spring.application.name=learning-tracker

# --- PostgreSQL ---
# A DB-t elore letre kell hozni:  CREATE DATABASE learning_tracker;
spring.datasource.url=jdbc:postgresql://localhost:5435/learning_tracker
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# --- JPA / Hibernate ---
# Dev-hez kenyelmes; elesben valts Flyway/Liquibase migraciora es allitsd 'validate'-re.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# A statikus frontend a src/main/resources/static-bol jon, azonos originrol (nincs CORS).
