<!-- Uj tantargy modal; a js/kodtar-elem.js tolti be a kodtar-elem.html #modal-mount helyere. -->
<div id="modal-overlay" class="modal-overlay" hidden>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <h2 id="modal-title">Új tantárgy</h2>

        <div class="field">
            <label class="field-label" for="modal-subject-name">Tantárgy neve</label>
            <input type="text" id="modal-subject-name" autocomplete="off" placeholder="Pl. Matematika">
        </div>

        <p id="modal-message" class="form-message error" hidden></p>

        <div class="form-actions">
            <button type="button" id="modal-cancel" class="btn-secondary">Mégse</button>
            <button type="button" id="modal-save" class="btn-primary">Hozzáadás</button>
        </div>
    </div>
</div>
