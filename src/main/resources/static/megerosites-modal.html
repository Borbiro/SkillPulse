<!-- Altalanos megerosito modal; a js/kodtar-elem.js tolti be a kodtar-elem.html #confirm-mount helyere. -->
<div id="confirm-overlay" class="modal-overlay" hidden>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="confirm-title">
        <h2 id="confirm-title">Megerősítés</h2>

        <p id="confirm-message" class="confirm-text">Biztosan folytatod?</p>

        <div class="form-actions">
            <button type="button" id="confirm-cancel" class="btn-secondary">Mégse</button>
            <button type="button" id="confirm-ok" class="btn-primary">Igen</button>
        </div>
    </div>
</div>
