<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Időzítő – Tanulás-követő</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header class="topbar">
        <button id="menu-toggle" class="menu-btn" aria-label="Menü" aria-expanded="false" aria-controls="side-menu">
            <span></span><span></span><span></span>
        </button>
        <h1><a href="/index.html">SkillPulse</a></h1>
        <div class="stats-strip">
            <span>Streak: <strong id="streak">–</strong> nap</span>
            <span>Ma: <strong id="today-total">–</strong> perc</span>
        </div>
    </header>

    <div id="menu-overlay" class="menu-overlay" hidden></div>
    <nav id="side-menu" class="side-menu" aria-hidden="true">
        <ul>
            <li><button class="menu-item" data-target="log">Napló</button></li>
            <li><button class="menu-item" data-target="timer">Időzítő</button></li>
            <li><button class="menu-item" data-target="stats">Statisztika</button></li>
            <li><button class="menu-item" data-target="settings">Beállítások</button></li>
        </ul>
    </nav>

    <main>
        <!-- Idozito -->
        <section class="card form-card" id="timer-card">
            <h2>Időzítő</h2>
            <form class="form-grid" autocomplete="off">
                <label class="field">
                    <span class="field-label">Tárgy</span>
                    <select id="timer-subject"><!-- targyak ide --></select>
                </label>

                <div class="field">
                    <span class="field-label">Eltelt idő</span>
                    <p id="timer-display" class="timer-display">00:00:00</p>
                </div>

                <div class="form-actions">
                    <button type="button" id="timer-pause" class="btn-secondary" disabled>Szünet</button>
                    <button type="button" id="timer-stop" class="btn-secondary" disabled>Leállítás</button>
                    <button type="button" id="timer-start" class="btn-primary">Indítás</button>
                </div>

                <label class="field">
                    <span class="field-label">Megjegyzés</span>
                    <textarea id="timer-note" placeholder="Megjegyzés (opcionális)"></textarea>
                </label>

                <p id="form-message" class="form-message" role="alert" hidden></p>

                <div class="form-actions">
                    <button type="button" id="timer-back" class="btn-secondary">Vissza</button>
                    <button type="button" id="timer-save" class="btn-primary" disabled>Mentés</button>
                </div>
            </form>
        </section>
    </main>

    <script src="/app.js"></script>
</body>
</html>
