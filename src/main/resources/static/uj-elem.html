<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Új elem rögzítése – Tanulás-követő</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header class="topbar">
        <button id="menu-toggle" class="menu-btn" aria-label="Menü" aria-expanded="false" aria-controls="side-menu">
            <span></span><span></span><span></span>
        </button>
        <h1><a href="/index.html">SkillPulse</a></h1>
        <div class="stats-strip">
            <span>Streak: <strong id="streak">–</strong> nap</span>
            <span>Ma: <strong id="today-total">–</strong> perc</span>
        </div>
    </header>

    <div id="menu-mount"><!-- a menu.html ide toltodik --></div>

    <main>
        <!-- Kezi rogzites -->
        <section class="card form-card" id="log-card">
            <h2>Új elem rögzítése</h2>
            <form class="form-grid" autocomplete="off">
                <label class="field">
                    <span class="field-label">Tárgy</span>
                    <select id="log-subject"><!-- targyak ide --></select>
                </label>

                <label class="field">
                    <span class="field-label">Dátum</span>
                    <input type="date" id="log-date">
                </label>

                <label class="field">
                    <span class="field-label">Időtartam (perc)</span>
                    <input type="number" id="log-duration" min="1" placeholder="pl. 45">
                </label>

                <label class="field">
                    <span class="field-label">Megjegyzés</span>
                    <textarea id="log-note" placeholder="Megjegyzés (opcionális)"></textarea>
                </label>

                <p id="form-message" class="form-message" role="alert" hidden></p>

                <div class="form-actions">
                    <button type="button" id="log-back" class="btn-secondary">Vissza</button>
                    <button type="button" id="log-save" class="btn-primary">Mentés</button>
                </div>
            </form>
        </section>
    </main>

    <script src="/app.js"></script>
</body>
</html>
